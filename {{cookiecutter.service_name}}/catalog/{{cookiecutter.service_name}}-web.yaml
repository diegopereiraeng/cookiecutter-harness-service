apiVersion: harness.io/v1
kind: Component
type: service
identifier: {{ cookiecutter.service_name | replace('-', '_') }}_web
name: {{ cookiecutter.service_name }} Web
owner: group:account/_account_all_users
orgIdentifier: {{ cookiecutter.harness_org | replace('-', '_') }}
projectIdentifier: {{ cookiecutter.harness_project | replace('-', '_') }}
spec:
  lifecycle: production
  sourceCode:
    provider: Harness
    repoName: {{ cookiecutter.service_name }}
    branch: main
    monoRepo: true
    monoRepoSubDirectoryPath: frontend
    url: https://app.harness.io/ng/account/{{ cookiecutter.harness_account_id }}/module/code/orgs/{{ cookiecutter.harness_org | replace('-', '_') }}/projects/{{ cookiecutter.harness_project | replace('-', '_') }}/repos/{{ cookiecutter.service_name }}/files/main/~/frontend
metadata:
  description: |
    {{ cookiecutter.service_description }}
    Frontend SPA built with React, TypeScript and Vite.
  annotations:
    backstage.io/techdocs-ref: url:https://app.harness.io/ng/account/{{ cookiecutter.harness_account_id }}/module/code/orgs/{{ cookiecutter.harness_org | replace('-', '_') }}/projects/{{ cookiecutter.harness_project | replace('-', '_') }}/repos/{{ cookiecutter.service_name }}/files/main/~/
    harness.io/project-url: https://app.harness.io/ng/account/{{ cookiecutter.harness_account_id }}/orgs/{{ cookiecutter.harness_org }}/projects/{{ cookiecutter.harness_project }}
    harness.io/pipelines: |
      CI: https://app.harness.io/ng/account/{{ cookiecutter.harness_account_id }}/module/ci/orgs/{{ cookiecutter.harness_org }}/projects/{{ cookiecutter.harness_project }}/pipelines/{{ cookiecutter.service_name | replace('-', '_') }}_web_ci/
  tags:
    - react
    - typescript
    - vite
    - frontend
  links:
    - title: CI Pipeline
      url: https://app.harness.io/ng/account/{{ cookiecutter.harness_account_id }}/orgs/{{ cookiecutter.harness_org }}/projects/{{ cookiecutter.harness_project }}/pipelines/{{ cookiecutter.service_name | replace('-', '_') }}_web_ci/executions
      icon: dashboard
      type: dashboard
    - title: Health Check
      url: http://localhost:3000
      icon: health
      type: runbook