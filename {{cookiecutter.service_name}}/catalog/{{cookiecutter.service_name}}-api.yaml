apiVersion: harness.io/v1
kind: Component
type: service
identifier: {{ cookiecutter.service_name | replace('-', '_') }}_api
name: {{ cookiecutter.service_name }} API
owner: group:account/_account_all_users
orgIdentifier: {{ cookiecutter.harness_org | replace('-', '_') }}
projectIdentifier: {{ cookiecutter.harness_project | replace('-', '_') }}
spec:
  lifecycle: production
  providesApis:
    - api:account/{{ cookiecutter.service_name | replace('-', '_') }}_openapi
  sourceCode:
    provider: Harness
    repoName: {{ cookiecutter.service_name }}
    branch: main
    monoRepo: true
    monoRepoSubDirectoryPath: backend
    url: https://app.harness.io/ng/account/{{ cookiecutter.harness_account_id }}/module/code/orgs/{{ cookiecutter.harness_org | replace('-', '_') }}/projects/{{ cookiecutter.harness_project | replace('-', '_') }}/repos/{{ cookiecutter.service_name }}/files/main/~/backend
metadata:
  description: |
    {{ cookiecutter.service_description }}
    Built with Node.js, Express and TypeScript.
  annotations:
    backstage.io/techdocs-ref: url:https://app.harness.io/ng/account/{{ cookiecutter.harness_account_id }}/module/code/orgs/{{ cookiecutter.harness_org | replace('-', '_') }}/projects/{{ cookiecutter.harness_project | replace('-', '_') }}/repos/{{ cookiecutter.service_name }}/files/main/~/
    harness.io/project-url: https://app.harness.io/ng/account/{{ cookiecutter.harness_account_id }}/orgs/{{ cookiecutter.harness_org }}/projects/{{ cookiecutter.harness_project }}
    harness.io/pipelines: |
      CI: https://app.harness.io/ng/account/{{ cookiecutter.harness_account_id }}/module/ci/orgs/{{ cookiecutter.harness_org }}/projects/{{ cookiecutter.harness_project }}/pipelines/{{ cookiecutter.service_name | replace('-', '_') }}_api_ci/
    harness.io/sto-test-target:
    - name: {{ cookiecutter.service_name }}
      scope: {{ cookiecutter.harness_org | replace('-', '_') }}.{{ cookiecutter.harness_project | replace('-', '_') }}
      variant: main
    - name: {{ cookiecutter.service_name }}-api
      scope: {{ cookiecutter.harness_org | replace('-', '_') }}.{{ cookiecutter.harness_project | replace('-', '_') }}
      variant: main
  tags:
    - nodejs
    - typescript
    - express
    - rest-api
  links:
    - title: CI Pipeline
      url: https://app.harness.io/ng/account/{{ cookiecutter.harness_account_id }}/orgs/{{ cookiecutter.harness_org }}/projects/{{ cookiecutter.harness_project }}/pipelines/{{ cookiecutter.service_name | replace('-', '_') }}_api_ci/executions
      icon: dashboard
      type: dashboard
    - title: SonarCloud Quality
      url: https://sonarcloud.io/project/overview?id={{ cookiecutter.sonar_project_key }}
      icon: dashboard
      type: dashboard
    - title: OpenAPI Contract
      url: https://app.harness.io/ng/account/{{ cookiecutter.harness_account_id }}/module/code/orgs/{{ cookiecutter.harness_org | replace('-', '_') }}/projects/{{ cookiecutter.harness_project | replace('-', '_') }}/repos/{{ cookiecutter.service_name }}/files/main/~/docs/openapi.yaml
      icon: docs
      type: documentation
    - title: Runbook
      url: https://app.harness.io/ng/account/{{ cookiecutter.harness_account_id }}/module/code/orgs/{{ cookiecutter.harness_org | replace('-', '_') }}/projects/{{ cookiecutter.harness_project | replace('-', '_') }}/repos/{{ cookiecutter.service_name }}/files/main/~/docs/runbook.md
      icon: docs
      type: runbook
    - title: Health Check
      url: http://localhost:8080/health
      icon: health
      type: runbook