apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ cookiecutter.service_name }}-api
  namespace: {{ cookiecutter.harness_project }}
  labels:
    app: {{ cookiecutter.service_name }}-api
    app.kubernetes.io/name: {{ cookiecutter.service_name }}-api
    app.kubernetes.io/part-of: {{ cookiecutter.service_name }}
    harness.io/service: {{ cookiecutter.service_name }}-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ cookiecutter.service_name }}-api
  template:
    metadata:
      labels:
        app: {{ cookiecutter.service_name }}-api
        app.kubernetes.io/name: {{ cookiecutter.service_name }}-api
    spec:
      containers:
        - name: api
          image: <+artifact.image>
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "8080"
            - name: APP_VERSION
              value: <+artifact.tag>
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
