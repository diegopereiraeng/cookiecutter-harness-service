apiVersion: v1
kind: Service
metadata:
  name: {% raw %}{{ .Values.name }}{% endraw %}-api
  namespace: {% raw %}{{ .Values.namespace }}{% endraw %}
  labels:
    app: {% raw %}{{ .Values.name }}{% endraw %}-api
    app.kubernetes.io/name: {% raw %}{{ .Values.name }}{% endraw %}-api
spec:
  selector:
    app: {% raw %}{{ .Values.name }}{% endraw %}-api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: {% raw %}{{ .Values.containerPort }}{% endraw %}
  type: {% raw %}{{ .Values.service.type }}{% endraw %}
