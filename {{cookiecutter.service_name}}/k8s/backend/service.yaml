apiVersion: v1
kind: Service
metadata:
  name: {{ cookiecutter.service_name }}-api
  namespace: {{ cookiecutter.harness_project }}
  labels:
    app: {{ cookiecutter.service_name }}-api
    app.kubernetes.io/name: {{ cookiecutter.service_name }}-api
spec:
  selector:
    app: {{ cookiecutter.service_name }}-api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
