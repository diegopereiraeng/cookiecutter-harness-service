# Base values — Harness expressions are resolved before Go template rendering
name: {{ cookiecutter.service_name }}
namespace: {{ cookiecutter.harness_project }}

image:
  repository: <+artifact.image>   # resolved by Harness at deploy time
  tag: <+artifact.tag>            # resolved by Harness at deploy time

replicaCount: 1
containerPort: 80

service:
  type: ClusterIP

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "200m"
