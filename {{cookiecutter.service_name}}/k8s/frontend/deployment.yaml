apiVersion: apps/v1
kind: Deployment
metadata:
  name: {% raw %}{{ .Values.name }}{% endraw %}-web
  namespace: {% raw %}{{ .Values.namespace }}{% endraw %}
  labels:
    app: {% raw %}{{ .Values.name }}{% endraw %}-web
    app.kubernetes.io/name: {% raw %}{{ .Values.name }}{% endraw %}-web
    app.kubernetes.io/part-of: {% raw %}{{ .Values.name }}{% endraw %}
    version: {% raw %}{{ .Values.image.tag }}{% endraw %}
spec:
  replicas: {% raw %}{{ .Values.replicaCount }}{% endraw %}
  selector:
    matchLabels:
      app: {% raw %}{{ .Values.name }}{% endraw %}-web
  template:
    metadata:
      labels:
        app: {% raw %}{{ .Values.name }}{% endraw %}-web
        version: {% raw %}{{ .Values.image.tag }}{% endraw %}
    spec:
      containers:
        - name: web
          image: {% raw %}{{ .Values.image.repository }}:{{ .Values.image.tag }}{% endraw %}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: {% raw %}{{ .Values.containerPort }}{% endraw %}
              protocol: TCP
          env:
            - name: APP_VERSION
              value: {% raw %}{{ .Values.image.tag }}{% endraw %}
          resources:
            requests:
              memory: {% raw %}{{ .Values.resources.requests.memory }}{% endraw %}
              cpu: {% raw %}{{ .Values.resources.requests.cpu }}{% endraw %}
            limits:
              memory: {% raw %}{{ .Values.resources.limits.memory }}{% endraw %}
              cpu: {% raw %}{{ .Values.resources.limits.cpu }}{% endraw %}
          readinessProbe:
            httpGet:
              path: /
              port: {% raw %}{{ .Values.containerPort }}{% endraw %}
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: {% raw %}{{ .Values.containerPort }}{% endraw %}
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
