apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ cookiecutter.service_name }}-web
  namespace: {{ cookiecutter.harness_project }}
  labels:
    app: {{ cookiecutter.service_name }}-web
    app.kubernetes.io/name: {{ cookiecutter.service_name }}-web
    app.kubernetes.io/part-of: {{ cookiecutter.service_name }}
    harness.io/service: {{ cookiecutter.service_name }}-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ cookiecutter.service_name }}-web
  template:
    metadata:
      labels:
        app: {{ cookiecutter.service_name }}-web
        app.kubernetes.io/name: {{ cookiecutter.service_name }}-web
    spec:
      containers:
        - name: web
          image: <+artifact.image>
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: APP_VERSION
              value: <+artifact.tag>
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
